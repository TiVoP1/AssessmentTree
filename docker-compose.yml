services:
  mariadb:
    image: mariadb:11.4
    container_name: property-manager-mariadb
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MARIADB_DATABASE: ${DB_NAME:-property_manager_dev}
      MARIADB_USER: ${DB_USER:-property_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-property_secret}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mariadb_data:
